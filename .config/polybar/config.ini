[colors]
base    = #1a1b2e
mantle  = #1e1e2e
surface = #24253e
overlay = #2e2f52
purple  = #bb9af7
cyan    = #7dcfff
teal    = #89dceb
pink    = #f38ba8
peach   = #fab387
text    = #cdd6f4
muted   = #565f89

[bar/noctavia]
width            = 100%
height           = 28
background       = ${colors.base}
foreground       = ${colors.text}
border-size      = 0
padding-left     = 2
padding-right    = 2
module-margin    = 1
font-0           = JetBrainsMono Nerd Font:size=10;2
separator        = %{F#565f89}|%{F-}
separator-margin = 1

modules-left   = i3
modules-center = date
modules-right  = memory cpu volume network

[module/i3]
type            = internal/i3
format          = <label-state>
label-focused   = %index%
label-focused-foreground = ${colors.purple}
label-focused-padding    = 2
label-unfocused = %index%
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding    = 2
label-urgent    = %index%
label-urgent-foreground = ${colors.pink}
label-urgent-padding    = 2

[module/date]
type     = internal/date
interval = 1
date     = %d %b
time     = %H:%M
format-prefix          = "  "
format-prefix-foreground = ${colors.purple}
label    = %date%  %time%

[module/memory]
type            = internal/memory
interval        = 2
format-prefix   = "  "
format-prefix-foreground = ${colors.cyan}
label           = %used%

[module/cpu]
type            = internal/cpu
interval        = 2
format-prefix   = "  "
format-prefix-foreground = ${colors.teal}
label           = %percentage%%

[module/volume]
type            = internal/pulseaudio
format-volume   = <ramp-volume> <label-volume>
label-muted     = "  mute"
label-muted-foreground = ${colors.muted}
ramp-volume-0   = 
ramp-volume-1   = 
ramp-volume-2   = 
ramp-volume-foreground = ${colors.peach}

[module/network]
type            = internal/network
interface = enp0s3
format-connected = <label-connected>
format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.teal}
label-connected = %downspeed%
format-disconnected = %{F#f38ba8}  off%{F-}
