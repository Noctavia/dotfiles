# ╔═══════════════════════════════════════════╗
# ║        Picom — Palette Noctavia           ║
# ╚═══════════════════════════════════════════╝

# ── Backend ──────────────────────────────────
# glx obligatoire pour dual_kawase blur
backend = "xrender";
vsync = false;

glx-copy-from-front = false;
use-damage = true;

# ── Ombres ───────────────────────────────────
shadow = true;
shadow-radius = 20;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.45;
shadow-color = "#1a1b2e";
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "class_g = 'i3bar'",
  "class_g = 'Rofi'",
  "_GTK_FRAME_EXTENTS@"
];

# ── Transparence ─────────────────────────────
inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
  "100:class_g = 'firefox'",
  "100:class_g = 'chromium'",
  "95:class_g  = 'kitty' && focused",
  "82:class_g  = 'kitty' && !focused"
];

# ── Blur ─────────────────────────────────────
blur-method = "gaussian";
blur-size = 10
blur-deviation = 5.0;
blur-background = false;
blur-background-frame = true;
blur-background-fixed = false;
blur-kern = "3x3box";
blur-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3bar'",
  "class_g = 'Rofi'"
];

# ── Animations (picom-animations fork) ───────
# Retirer ces lignes si tu utilises le picom standard
animations = false;
animation-stiffness = 220;
animation-dampening = 22;
animation-clamping = true;
animation-mass = 1;
animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "slide-left";
animation-for-workspace-switch-out = "slide-right";
animation-for-transient-window = "slide-up";

# ── Fondu ────────────────────────────────────
fading = true;
fade-in-step  = 0.04;
fade-out-step = 0.04;
fade-delta = 4;
fade-exclude = [];

# ── Coins arrondis ───────────────────────────
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3bar'"
];

# ── Divers ───────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
log-level = "warn";

wintypes:
{
  tooltip      = { fade = true; shadow = true; opacity = 0.95; focus = true; full-shadow = false; };
  dock         = { shadow = false; clip-shadow-above = true; };
  dnd          = { shadow = false; };
  popup_menu   = { opacity = 0.95; shadow = false; };
  dropdown_menu = { opacity = 0.95; shadow = false; };
};
